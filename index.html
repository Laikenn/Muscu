
<style>
:root {
  --bg: #0d0f14;
  --surface: #161820;
  --card: #1e2028;
  --border: rgba(255,255,255,0.08);
  --accent: #c8f04a;
  --accent-dim: rgba(200,240,74,0.12);
  --accent-text: #0d0f14;
  --text: #f0f0f0;
  --muted: #6b6f7a;
  --danger: #ff6b6b;
}
</style>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Programme Muscu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161820;
    --card: #1e2028;
    --border: rgba(255,255,255,0.08);
    --accent: #20e4b9;
    --accent-dim: rgba(200,240,74,0.12);
    --accent-text: #0d0f14;
    --text: #f0f0f0;
    --muted: #6b6f7a;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    padding: 32px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 5vw, 60px);
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  header p { color: var(--muted); font-size: 13px; margin-top: 4px; }

  .days-nav {
    display: flex;
    gap: 8px;
    padding: 20px 32px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .days-nav::-webkit-scrollbar { display: none; }
  .day-btn {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 9px 22px;
    border-radius: 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-btn:hover { border-color: var(--accent); color: var(--text); }
  .day-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }

  .day-content { display: none; padding: 28px 32px; }
  .day-content.active { display: block; }

  .day-header { margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .day-header-left h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 1px;
  }
  .day-meta { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
  .badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .badge span { color: var(--accent); font-weight: 600; }

  .progress-bar-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .progress-bar-bg { flex: 1; height: 3px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; border-radius: 4px; }
  .progress-label { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* ===== DISPOSITION EN COLONNES ===== */
  .exercises-row {
    display: flex;
    gap: 14px;
    align-items: stretch;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .exercises-row::-webkit-scrollbar { height: 4px; }
  .exercises-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Séparateur repos vertical entre les exos */
  .rest-divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-shrink: 0;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    padding: 0 2px;
    min-height: 100%;
  }
  .rest-line-v {
    width: 1px;
    flex: 1;
    background: var(--border);
    min-height: 40px;
  }

  /* CARTE EXERCICE — verticale */
  .exercise-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    width: 200px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .exercise-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .exercise-card:hover { border-color: rgba(200,240,74,0.3); transform: translateY(-3px); }
  .exercise-card:hover::after { opacity: 1; }
  .exercise-card.done { opacity: 0.45; border-color: var(--border); }
  .exercise-card.done::after { opacity: 1; background: var(--muted); }

  /* IMAGE grande */
  .exo-img-wrap {
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background: var(--surface);
    border-radius: 14px 14px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .exo-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .exo-img-placeholder {
    font-size: 52px;
    opacity: 0.35;
  }
  .exo-num-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(13,15,20,0.75);
    backdrop-filter: blur(4px);
    border-radius: 8px;
    padding: 2px 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--accent);
    line-height: 1.2;
  }

  /* CORPS CARTE */
  .exo-body { padding: 14px 14px 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .exo-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .exo-sets {
    display: inline-block;
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 13px;
    font-weight: 700;
  }
  .exo-note { font-size: 11.5px; color: var(--muted); font-style: italic; line-height: 1.4; }

  /* Timer */
  .timer-section { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .timer-ring-wrap { position: relative; width: 48px; height: 48px; flex-shrink: 0; }
  .timer-ring-wrap svg { transform: rotate(-90deg); }
  .timer-ring-bg { stroke: var(--border); }
  .timer-ring-fill { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .timer-display {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--text);
  }
  .btn-timer {
    flex: 1;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-timer:hover { background: var(--accent); color: var(--accent-text); }
  .btn-timer.running { background: var(--accent-dim); }

  /* BOUTON DONE */
  .card-footer { padding: 0 14px 14px; }
  .btn-done {
    width: 100%;
    padding: 8px;
    border-radius: 10px;
    background: transparent;
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-done:hover { border-color: var(--accent); color: var(--accent); }
  .exercise-card.done .btn-done { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }

  /* FIN */
  .day-finish { display: none; text-align: center; padding: 40px 20px; animation: fadeIn 0.5s; }
  .day-finish.show { display: block; }
  .day-finish h3 { font-family: 'Bebas Neue', sans-serif; font-size: 38px; color: var(--accent); }
  .day-finish p { color: var(--muted); margin-top: 8px; }

  .btn-reset-day {
    margin-top: 24px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reset-day:hover { border-color: var(--danger); color: var(--danger); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    header, .day-content { padding: 20px 16px; }
    .days-nav { padding: 14px 16px; }
    .exercise-card { width: 170px; }
  }
</style>
</head>

<header>
  <div>
    <h1>Mon Programme</h1>
    <p>Choisis un jour — tous tes exercices s'affichent côte à côte</p>
  </div>
</header>

<nav class="days-nav" id="daysNav"></nav>
<main id="mainContent"></main>

<script>
const nav = document.getElementById('daysNav');
const main = document.getElementById('mainContent');
let audioCtx;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

PROGRAM.forEach((day, di) => {
  /* Nav button */
  const btn = document.createElement('button');
  btn.className = 'day-btn' + (di === 0 ? ' active' : '');
  btn.textContent = day.day;
  btn.onclick = () => switchDay(di);
  nav.appendChild(btn);

  /* Section */
  const section = document.createElement('section');
  section.className = 'day-content' + (di === 0 ? ' active' : '');
  section.id = 'day-' + di;

  const totalSets = day.exercises.reduce((s, e) => s + e.sets, 0);

  section.innerHTML = `
    <div class="day-header">
      <div class="day-header-left">
        <h2>${day.day.toUpperCase()} — <span style="color:var(--accent)">${day.focus}</span></h2>
        <div class="day-meta">
          <div class="badge"><span>${day.exercises.length}</span> exercices</div>
          <div class="badge"><span>${totalSets}</span> séries</div>
        </div>
      </div>
      <button class="btn-reset-day" onclick="resetDay(${di})">↺ Réinitialiser</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-${di}"></div></div>
      <span class="progress-label" id="prog-label-${di}">0 / ${day.exercises.length}</span>
    </div>
    <div class="exercises-row" id="list-${di}"></div>
    <div class="day-finish" id="finish-${di}">
      <h3>Séance terminée 💪</h3>
      <p>Bravo ! Pense à t'étirer et à t'hydrater.</p>
    </div>
  `;

  const list = section.querySelector(`#list-${di}`);

  day.exercises.forEach((exo, ei) => {
    /* Séparateur repos entre exos */
    if (ei > 0) {
      const div = document.createElement('div');
      div.className = 'rest-divider';
      div.innerHTML = `<div class="rest-line-v"></div><span>⏱</span><span>${REST_TIME}</span><div class="rest-line-v"></div>`;
      list.appendChild(div);
    }

    const card = document.createElement('div');
    card.className = 'exercise-card';
    card.id = `card-${di}-${ei}`;

    const imgHtml = exo.img
      ? `<img src="${exo.img}" alt="${exo.name}" loading="lazy">`
      : `<span class="exo-img-placeholder">🏋️</span>`;

    const timerHtml = exo.timer > 0 ? `
      <div class="timer-section">
        <div class="timer-ring-wrap">
          <svg width="48" height="48" viewBox="0 0 48 48">
            <circle class="timer-ring-bg" cx="24" cy="24" r="20" fill="none" stroke-width="3"/>
            <circle class="timer-ring-fill" id="ring-${di}-${ei}" cx="24" cy="24" r="20" fill="none" stroke-width="3"
              stroke-dasharray="${2*Math.PI*20}"
              stroke-dashoffset="0"/>
          </svg>
          <div class="timer-display" id="tdisp-${di}-${ei}">${exo.timer}s</div>
        </div>
        <button class="btn-timer" id="tbtn-${di}-${ei}" onclick="toggleTimer(${di},${ei},${exo.timer})">▶ Lancer</button>
      </div>` : '';

    card.innerHTML = `
      <div class="exo-img-wrap">
        ${imgHtml}
        <div class="exo-num-badge">${String(ei+1).padStart(2,'0')}</div>
      </div>
      <div class="exo-body">
        <div class="exo-name">${exo.name}</div>
        <div><span class="exo-sets">${exo.sets} × ${exo.reps}</span></div>
        ${exo.note ? `<div class="exo-note">💡 ${exo.note}</div>` : ''}
        ${timerHtml}
      </div>
      <div class="card-footer">
        <button class="btn-done" onclick="toggleDone(${di},${ei})">✓ Fait</button>
      </div>
    `;
    list.appendChild(card);
  });

  main.appendChild(section);
});

function switchDay(di) {
  document.querySelectorAll('.day-btn').forEach((b,i) => b.classList.toggle('active', i===di));
  document.querySelectorAll('.day-content').forEach((s,i) => s.classList.toggle('active', i===di));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

const doneState = {};
function toggleDone(di, ei) {
  const key = `${di}-${ei}`;
  doneState[key] = !doneState[key];
  document.getElementById(`card-${di}-${ei}`).classList.toggle('done', doneState[key]);
  updateProgress(di);
}

function updateProgress(di) {
  const total = PROGRAM[di].exercises.length;
  const done = PROGRAM[di].exercises.filter((_,ei) => doneState[`${di}-${ei}`]).length;
  const pct = total ? (done/total)*100 : 0;
  document.getElementById(`prog-${di}`).style.width = pct + '%';
  document.getElementById(`prog-label-${di}`).textContent = `${done} / ${total}`;
  document.getElementById(`finish-${di}`).classList.toggle('show', done === total);
}

function resetDay(di) {
  PROGRAM[di].exercises.forEach((_,ei) => {
    doneState[`${di}-${ei}`] = false;
    document.getElementById(`card-${di}-${ei}`).classList.remove('done');
    stopTimer(di, ei, PROGRAM[di].exercises[ei].timer);
  });
  updateProgress(di);
}

const timerState = {};
function toggleTimer(di, ei, total) {
  const key = `${di}-${ei}`;
  if (timerState[key]?.running) stopTimer(di, ei, total);
  else startTimer(di, ei, total);
}

function startTimer(di, ei, total) {
  const key = `${di}-${ei}`;
  const disp = document.getElementById(`tdisp-${di}-${ei}`);
  const ring = document.getElementById(`ring-${di}-${ei}`);
  const btn = document.getElementById(`tbtn-${di}-${ei}`);
  const circ = 2 * Math.PI * 20;
  let remaining = timerState[key]?.remaining ?? total;

  btn.textContent = '⏸ Pause';
  btn.classList.add('running');

  const interval = setInterval(() => {
    remaining--;
    disp.textContent = remaining + 's';
    ring.style.strokeDashoffset = circ * (1 - remaining / total);
    if (remaining <= 0) {
      clearInterval(interval);
      timerState[key] = { running: false, remaining: total };
      disp.textContent = total + 's';
      ring.style.strokeDashoffset = 0;
      btn.textContent = '▶ Lancer';
      btn.classList.remove('running');
      playBeep();
    }
  }, 1000);

  timerState[key] = { running: true, interval, remaining };
}

function stopTimer(di, ei, total) {
  const key = `${di}-${ei}`;
  if (timerState[key]?.interval) clearInterval(timerState[key].interval);
  const remaining = timerState[key]?.remaining ?? total;
  timerState[key] = { running: false, remaining };
  const btn = document.getElementById(`tbtn-${di}-${ei}`);
  if (btn) { btn.textContent = '▶ Reprendre'; btn.classList.remove('running'); }
}

function playBeep() {
  const ctx = getAudio();
  let t = ctx.currentTime;
  BEEP_SEQUENCE.forEach(b => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(b.freq, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
    gain.gain.linearRampToValueAtTime(0, t + b.dur);
    osc.start(t); osc.stop(t + b.dur + 0.05);
    t += b.dur + 0.08;
  });
}
</script>
